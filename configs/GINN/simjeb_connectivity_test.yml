###################
## CONNECTIVITY TEST CONFIG
## Testing Phase 3.5 connectivity with FULL GINN training losses
## Goal: Verify connectivity helps when combined with real shape constraints
###################

wandb_experiment_name: 'simjeb_connectivity_test'

# Reused variables
vars:
  nx: 3
  nz: 8                  # larger latent for diversity
  ginn_bsize: 8          # moderate batch for testing
  val_plot_grid: [2, 4]
  problem_str: 'simjeb'
  ginn_on: 1
  n_points_surface: 50000  # reduced for faster testing
  nf_is_density: False
  level_set: 0.0

# Global variables
nx: ${vars.nx}
nz: ${vars.nz}
ginn_bsize: ${vars.ginn_bsize}
level_set: ${vars.level_set}
nf_is_density: ${vars.nf_is_density}

###################
## Training Mode - GENERATIVE
###################
training_mode: 'generative'

###################
## Model
###################
model:
  model_str: 'cond_wire'
  nx: ${vars.nx}
  nz: ${vars.nz}
  return_density: ${vars.nf_is_density}
  w0_initial: 18
  wire_scale: 6
  layers: [128, 128, 128]

reset_zlatents_every_n_epochs: 1  # resample z every epoch (generative mode)

latent_sampling:
  nz: ${vars.nz}
  ginn_bsize: ${vars.ginn_bsize}
  z_sample_method: 'uniform'  # uniform sampling for generative
  val_plot_grid: ${vars.val_plot_grid}
  z_sample_interval: [-1, 1]

###################
## Data
###################
data:
  simjeb_ids: []

###################
## Plotting
###################
train_plot_max_n_shapes: 4
plot_every_n_epochs: 100
valid_every_n_epochs: 500

###################
## Loss Configuration
## Key insight from tests: connectivity alone doesn't work
## Need real GINN losses (env, if, scc) for shape preservation
###################
objective: 'curv'
field_losses: []  # comp/vol disabled for simpler testing

# Data losses
lambda_data: 0.0
lambda_lip: 0.0
lambda_dirichlet: 0.0

# === LOCAL GINN LOSSES (shape preservation) ===
lambda_if: ${eval:${vars.ginn_on} * 1.0}          # interface
lambda_env: ${eval:${vars.ginn_on} * 1.0}         # envelope
lambda_obst: ${eval:${vars.ginn_on} * 0.0}        # obstacle (disabled)
lambda_if_normal: ${eval:${vars.ginn_on} * 1.0}   # normal constraint

# === GLOBAL GINN LOSSES ===
lambda_eikonal: ${eval:${vars.ginn_on} * 1.0}     # SDF regularization
lambda_scc: ${eval:${vars.ginn_on} * 100}         # topological constraint (SCC)
lambda_curv: 1.0                                  # curvature
lambda_div: 0.0                                   # divergence

max_curv: 0
max_div: -0.1

# Start epochs for losses
start_curv: 500
start_div: 500

# Scaling
scale_curv: 1.0e-3
scale_div: 1.0
scale_chamfer_div: 1
scale_vol: 1
scale_comp: 1
scale_eikonal: 0.1

dirichlet_use_surface_points: True

###################
## PHASE 2: DIVERSITY (initially disabled to isolate connectivity)
###################
lambda_shape_diversity: 0.0    # DISABLED for isolation test
diversity_type: 'chamfer'
diversity_aggregation: 'min'
max_diversity: null
scale_shape_diversity: 1.0

###################
## PHASE 3.5: CONNECTIVITY - STRONG for testing (V2 with improvements)
###################
lambda_connectivity: 0.5       # Strong (based on test results)
connectivity_n_samples: 500
connectivity_n_iter: 30
connectivity_grad_tol: 0.01
connectivity_update_every_n_epochs: 50  # more frequent updates
connectivity_near_surface_threshold: 0.15  # only penalize saddles near surface
connectivity_max_step_size: 0.3  # clamp Newton steps for stability
scale_connectivity: 1.0
start_connectivity: 500        # start earlier to observe effect

###################
## Curvature
###################
exclude_surface_points_close_to_interface_cutoff: 0.04

###################
## SCC Algorithm (topology)
###################
ph:
  nx: ${vars.nx}
  problem_str: ${vars.problem_str}
  ginn_bsize: ${vars.ginn_bsize}
  is_density: ${vars.nf_is_density}
  iso_level: -0.0
  ph_1_hole_level: 0.06
  ph_loss_maxdim: 1
  ph_loss_target_betti: [1, 0, 0]
  scc_penalty_norm_eps: 1.0e-4
  scc_n_grid_points: 32  # REDUCED from 64 to prevent OOM
  evaluate_ph_grid_per_shape: True

###################
## Surface Points
###################
surface:
  nx: ${vars.nx}
  n_points_surface: ${vars.n_points_surface}
  level_set: ${vars.level_set}
  do_numerical_surface_points: False
  bin_search_steps: 10
  equidistant_init_grid: True
  do_uniform_resampling: True
  recompute_every_n_epochs: 1

###################
## Logging
###################
log_level: 'WARNING'  # Reduced to make progress bar visible
num_workers: ${eval:min(${vars.ginn_bsize}, 8)}

###################
## Plotting
###################
plot:
  val_plot_grid: ${vars.val_plot_grid}
  problem_str: ${vars.problem_str}
  fig_size: [12, 7]
  level_set: ${vars.level_set}
  show_colorbar: True

meshing:
  level_set: ${vars.level_set}
  nf_is_density: ${vars.nf_is_density}
  mc_resolution: 128
  mesh_reduction: 0.9

plot_shape: True
val_plot_shape: True
plot_surface_points: True
plot_ph_diagram: True
plot_surface_pts_every_n_epochs: 100

timer:
  print: False
  accumulate: True

###################
## Problem
###################
problem:
  problem_str: ${vars.problem_str}

problem_sampling:
  nx: ${vars.nx}
  n_points_domain: 2048
  n_points_envelope: 16384
  n_points_interfaces: 4096
  n_points_normals: 4096
  n_points_surface: ${vars.n_points_surface}

###################
## Training
###################
max_epochs: 3000           # shorter for testing
lr: 0.001
opt: adam
use_scheduler: False
scheduler_gamma: 0.5
decay_steps: 5000

grad_clipping:
  grad_clipping_on: True
  grad_clip: 0.5
  auto_clip_on: True

model_save_path: 'checkpoints'
save_every_n_epochs: 500
overwrite_existing_saved_model: True
save_optimizer: True

load_mos: False
load_model: False
load_optimizer: False
load_scheduler: False
